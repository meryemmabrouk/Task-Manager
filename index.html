<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Task Manager App</title> 
    <link rel="stylesheet" href="css/styles.css"> 
</head>
<body>
    <div class="container">
        <div class="title">
        <h1>Task Manager</h1>
        </div>
        <div class="taskInput">
            <input id="enterBox" type="text" placeholder="Enter a new task"/> 
            <button class="addTask" id="addTaskBtn">Add Task</button>
        </div>
        <div class="threeButtons">
        <button>All</button>
        <button>Completed</button>
        <button>Pending</button>
        </div>
        <div class="tasks">
        <ul id="taskList"></ul>
        <p id="taskCounter">0 Tasks</p>
        </div>
    </div>
    <script src ="js/app.js" ></script>
</body>
</html>
